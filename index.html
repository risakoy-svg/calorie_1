<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BurnCalorie - Full Edit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanilla-calendar-pro/build/vanilla-calendar.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/vanilla-calendar-pro/build/vanilla-calendar.min.css" rel="stylesheet">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('Service Worker Registered'));
    }
  </script>
  <style>
    .vanilla-calendar { width: 100% !important; border: none !important; }
    @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .animate-slide-up { animation: slide-up 0.3s ease-out; }
    /* 編集モード時のスタイル */
    .edit-mode-active .edit-badge { display: flex !important; }
    .edit-mode-active .main-btn-circle { opacity: 0.3; filter: grayscale(0.5); }
  </style>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BurnCalorie">
  <link rel="apple-touch-icon" href="icon.png">

<link rel="manifest" href="manifest.json">
</head>
<body class="bg-gray-100 flex justify-center text-gray-800">

  <div id="appContainer" class="w-full max-w-md bg-white min-h-screen shadow-xl relative pb-28">
    <header class="flex justify-between items-center p-4 border-b bg-white sticky top-0 z-20">
      <h1 class="text-xl font-bold text-blue-600 tracking-tight">BurnCalorie</h1>
      <button onclick="toggleCalendarModal(true)" class="text-2xl p-2 active:bg-gray-100 rounded-full">📅</button>
    </header>

    <section class="p-4 bg-blue-50/50 border-b">
      <h2 class="text-xs text-gray-400 mb-1 font-bold uppercase">Today's Burn</h2>
      <div class="text-3xl font-black text-blue-600 mb-3"><span id="todayTotal">0</span> <span class="text-sm font-normal text-gray-400">kcal</span></div>
      <div class="h-32 w-full bg-white p-2 rounded-xl border border-blue-100 shadow-sm">
        <canvas id="weeklyChart"></canvas>
      </div>
    </section>

    <section class="p-6">
      <h2 class="text-sm text-gray-500 mb-6 font-semibold flex items-center gap-2">
        アクティビティを記録
        <span id="editStatusBadge" class="hidden text-[10px] bg-red-500 text-white px-2 py-0.5 rounded-full">編集モード中</span>
      </h2>
      
      <div id="buttonGrid" class="grid grid-cols-3 gap-y-12 gap-x-4 text-center items-start">
        <div id="controlButtons" class="contents">
          <div id="addBtnBox" class="flex flex-col items-center">
            <button onclick="openRegisterModal()" class="w-16 h-16 bg-gray-50 border-2 border-dashed border-gray-300 rounded-full flex items-center justify-center text-2xl text-gray-400 active:bg-gray-100 transition">＋</button>
            <span class="text-xs mt-2 text-gray-400 font-medium">追加</span>
          </div>
          <div class="flex flex-col items-center">
            <button id="masterEditBtn" onclick="toggleEditMode()" class="w-16 h-16 bg-gray-50 border-2 border-gray-200 rounded-full flex items-center justify-center text-xl text-gray-400 active:bg-blue-50 transition">
              <span id="editBtnIcon">✎</span>
            </button>
            <span id="editBtnLabel" class="text-xs mt-2 text-gray-400 font-medium">編集・削除</span>
          </div>
        </div>
      </div>
    </section>

    <div id="patternModal" class="fixed inset-0 bg-black/50 z-40 flex items-center justify-center hidden p-4">
      <div class="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl overflow-y-auto max-h-[90vh]">
        <h3 id="modalTitle" class="text-lg font-bold mb-4">アクティビティ設定</h3>
        <label class="text-xs text-gray-400 font-bold mb-2 block uppercase">アイコン選択</label>
        <div id="iconSelectionGrid" class="grid grid-cols-4 gap-2 mb-4 p-2 bg-gray-50 rounded-xl border"></div>
        <div class="space-y-3">
          <input id="inputName" type="text" placeholder="なまえ" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
          <div class="flex gap-2">
            <input id="inputMin" type="number" placeholder="分" class="w-full border p-3 rounded-xl outline-none flex-1">
            <input id="inputKcal" type="number" placeholder="kcal" class="w-full border p-3 rounded-xl outline-none flex-1">
          </div>
        </div>
        <div class="flex gap-2 mt-8 sticky bottom-0 bg-white pt-2">
          <button onclick="closePatternModal()" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold text-gray-400">戻る</button>
          <button id="savePatternBtn" onclick="savePattern()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg">保存</button>
        </div>
      </div>
    </div>

    <div id="calendarModal" class="fixed inset-0 bg-black/50 z-50 flex items-end justify-center hidden">
        <div class="bg-white rounded-t-3xl w-full max-w-md p-6 shadow-2xl animate-slide-up">
          <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h3 class="text-lg font-bold text-blue-600 font-black">HISTORY</h3>
            <button onclick="toggleCalendarModal(false)" class="text-gray-400 text-2xl p-2">✕</button>
          </div>
          <div id="calendar" class="mb-4"></div>
          <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 flex items-center gap-3">
            <div class="flex-1">
              <p id="selectedDateText" class="text-[10px] text-gray-400 font-bold">DATE</p>
              <input id="editKcalInput" type="number" class="w-full text-2xl font-black text-blue-600 bg-transparent outline-none">
            </div>
            <button onclick="saveEditCalorie()" class="bg-blue-600 text-white font-bold py-3 px-6 rounded-xl shadow-md">保存</button>
          </div>
        </div>
      </div>
  </div>

  <script>
    const HISTORY_KEY = 'burn_cal_hist_v9';
    const PATTERN_KEY = 'burn_cal_patt_v9';
    const getTodayStr = (date = new Date()) => {
        const d = new Date(date.getTime() - (date.getTimezoneOffset() * 60000));
        return d.toISOString().split('T')[0];
    };
    
    let calorieHistory = JSON.parse(localStorage.getItem(HISTORY_KEY)) || {};
    // 初期状態でランニングを入れておく
    let myPatterns = JSON.parse(localStorage.getItem(PATTERN_KEY)) || [
        { id: 'fixed-1', emoji: '🏃', name: 'ランニング', kcal: 300, min: 30 }
    ];
    let todayStr = getTodayStr();
    let selectedDate = todayStr;
    let selectedEmoji = '';
    let isEditMode = false;
    let editingPatternId = null;

    // グラフ
    const ctx = document.getElementById('weeklyChart').getContext('2d');
    const myChart = new Chart(ctx, {
      type: 'bar',
      data: { labels: [], datasets: [{ data: [], backgroundColor: [], borderRadius: 6 }] },
      options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, display: false }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
    });

    function updateUI() {
      const labels = []; const data = []; const colors = [];
      for(let i=6; i>=0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        const s = getTodayStr(d);
        labels.push(['日','月','火','水','木','金','土'][d.getDay()]);
        data.push(calorieHistory[s] || 0);
        colors.push(s === todayStr ? '#3b82f6' : '#bfdbfe');
      }
      myChart.data.labels = labels;
      myChart.data.datasets[0].data = data;
      myChart.data.datasets[0].backgroundColor = colors;
      myChart.update();
      document.getElementById('todayTotal').innerText = calorieHistory[todayStr] || 0;
    }

    // アイコンリスト
    const emojiList = [
      {e:'🚶', n:'歩く'}, {e:'🏃', n:'走る'}, {e:'🧹', n:'掃除'}, {e:'🚲', n:'自転車'},
      {e:'🧘', n:'ヨガ'}, {e:'🏋️', n:'筋トレ'}, {e:'🏊', n:'泳ぐ'}, {e:'💃', n:'ダンス'},
      {e:'🎤', n:'歌う'}, {e:'🥊', n:'ボクシング'}, {e:'🧗', n:'登る'}, {e:'🛀', n:'入浴'},
      {e:'🧖', n:'サウナ'}, {e:'🧼', n:'洗濯'}, {e:'🏀', n:'バスケ'}, {e:'🎾', n:'テニス'}
    ];
    const iGrid = document.getElementById('iconSelectionGrid');
    emojiList.forEach(item => {
      const b = document.createElement('button');
      b.className = "flex flex-col items-center p-2 rounded-xl border-2 border-transparent hover:bg-blue-50 transition-all";
      b.innerHTML = `<span class="text-2xl">${item.e}</span><span class="text-[9px] text-gray-500 font-bold mt-1">${item.n}</span>`;
      b.onclick = () => {
        Array.from(iGrid.children).forEach(el => el.classList.remove('bg-blue-100', 'border-blue-500'));
        b.classList.add('bg-blue-100', 'border-blue-500');
        selectedEmoji = item.e;
      };
      iGrid.appendChild(b);
    });

    function toggleEditMode() {
      isEditMode = !isEditMode;
      const container = document.getElementById('appContainer');
      const masterBtn = document.getElementById('masterEditBtn');
      const icon = document.getElementById('editBtnIcon');
      const label = document.getElementById('editBtnLabel');
      const badge = document.getElementById('editStatusBadge');
      const addBtnBox = document.getElementById('addBtnBox');

      if (isEditMode) {
        container.classList.add('edit-mode-active');
        masterBtn.classList.replace('bg-gray-50', 'bg-blue-600');
        masterBtn.classList.replace('text-gray-400', 'text-white');
        icon.innerText = '✓';
        label.innerText = '完了';
        label.classList.replace('text-gray-400', 'text-blue-600');
        badge.classList.remove('hidden');
        addBtnBox.classList.add('opacity-10', 'pointer-events-none');
      } else {
        container.classList.remove('edit-mode-active');
        masterBtn.classList.replace('bg-blue-600', 'bg-gray-50');
        masterBtn.classList.replace('text-white', 'text-gray-400');
        icon.innerText = '✎';
        label.innerText = '編集・削除';
        label.classList.replace('text-blue-600', 'text-gray-400');
        badge.classList.add('hidden');
        addBtnBox.classList.remove('opacity-10', 'pointer-events-none');
      }
    }

    function openRegisterModal() {
      editingPatternId = null;
      document.getElementById('modalTitle').innerText = '新規アクティビティ';
      clearInputs();
      togglePatternModal(true);
    }

    function openEditModal(id) {
      editingPatternId = id;
      const p = myPatterns.find(x => x.id === id);
      document.getElementById('modalTitle').innerText = '設定を編集';
      document.getElementById('inputName').value = p.name;
      document.getElementById('inputMin').value = p.min;
      document.getElementById('inputKcal').value = p.kcal;
      selectedEmoji = p.emoji;
      // アイコン選択状態の反映
      Array.from(iGrid.children).forEach(el => {
          el.classList.remove('bg-blue-100', 'border-blue-500');
          if(el.querySelector('.text-2xl').innerText === p.emoji) el.classList.add('bg-blue-100', 'border-blue-500');
      });
      togglePatternModal(true);
    }

    function savePattern() {
      const name = document.getElementById('inputName').value || 'ななし';
      const kcal = parseInt(document.getElementById('inputKcal').value) || 0;
      const min = parseInt(document.getElementById('inputMin').value) || 0;
      if(!selectedEmoji) return alert('アイコンを選んでね');

      if(editingPatternId) {
        const idx = myPatterns.findIndex(x => x.id === editingPatternId);
        myPatterns[idx] = { ...myPatterns[idx], emoji: selectedEmoji, name, kcal, min };
      } else {
        myPatterns.push({ id: 'p-' + Date.now(), emoji: selectedEmoji, name, kcal, min });
      }
      localStorage.setItem(PATTERN_KEY, JSON.stringify(myPatterns));
      togglePatternModal(false);
      renderButtons();
    }

    function deletePattern(id) {
      if(confirm('このアクティビティを削除しますか？')) {
        myPatterns = myPatterns.filter(x => x.id !== id);
        localStorage.setItem(PATTERN_KEY, JSON.stringify(myPatterns));
        renderButtons();
      }
    }

    function renderButtons() {
      const grid = document.getElementById('buttonGrid');
      grid.querySelectorAll('.dynamic-item').forEach(el => el.remove());
      myPatterns.forEach(p => {
        const div = document.createElement('div');
        div.className = "relative flex flex-col items-center dynamic-item";
        div.innerHTML = `
          <button onclick="if(!isEditMode) addCalorie(${p.kcal})" class="main-btn-circle w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center text-3xl shadow-sm active:scale-95 transition-all">
            ${p.emoji}
          </button>
          <span class="text-xs mt-2 font-bold text-gray-700">${p.name}</span>
          <span class="text-[10px] text-gray-400 mt-1">${p.min}分/${p.kcal}kcal</span>
          <button onclick="deletePattern('${p.id}')" class="edit-badge hidden absolute -top-1 -left-1 bg-red-500 text-white w-7 h-7 rounded-full text-[10px] font-bold items-center justify-center shadow-lg border-2 border-white">✕</button>
          <button onclick="openEditModal('${p.id}')" class="edit-badge hidden absolute -top-1 -right-1 bg-gray-600 text-white w-7 h-7 rounded-full text-[10px] font-bold items-center justify-center shadow-lg border-2 border-white">✎</button>
        `;
        grid.insertBefore(div, document.getElementById('controlButtons'));
      });
    }

    function clearInputs() {
      document.getElementById('inputName').value = '';
      document.getElementById('inputKcal').value = '';
      document.getElementById('inputMin').value = '';
      selectedEmoji = '';
      Array.from(iGrid.children).forEach(el => el.classList.remove('bg-blue-100', 'border-blue-500'));
    }

    function togglePatternModal(s) { document.getElementById('patternModal').classList.toggle('hidden', !s); }
    function closePatternModal() { togglePatternModal(false); }
    function addCalorie(k) { calorieHistory[todayStr] = (calorieHistory[todayStr] || 0) + k; saveHistory(); }
    function saveHistory() { localStorage.setItem(HISTORY_KEY, JSON.stringify(calorieHistory)); updateUI(); }
    
    let calendar;
    function toggleCalendarModal(s) {
      document.getElementById('calendarModal').classList.toggle('hidden', !s);
      if(s && !calendar) {
        calendar = new VanillaCalendar('#calendar', {
            settings: { lang: 'ja', selection: { day: 'single' } },
            actions: { clickDay(e, self) {
                selectedDate = self.selectedDates[0];
                document.getElementById('selectedDateText').innerText = selectedDate + " EDIT";
                document.getElementById('editKcalInput').value = calorieHistory[selectedDate] || 0;
            }}
        });
        calendar.init();
      }
    }
    function saveEditCalorie() {
      calorieHistory[selectedDate] = parseInt(document.getElementById('editKcalInput').value) || 0;
      saveHistory();
      alert('保存しました！');
    }

    renderButtons();
    updateUI();
  </script>
</body>
</html>
