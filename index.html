<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BurnCalorie - Side Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanilla-calendar-pro/build/vanilla-calendar.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/vanilla-calendar-pro/build/vanilla-calendar.min.css" rel="stylesheet">
  <style>
    .vanilla-calendar { width: 100% !important; border: none !important; }
    @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .animate-slide-up { animation: slide-up 0.3s ease-out; }
    
    /* サイドメニュー用のアニメーション */
    #sideMenu {
      transition: transform 0.3s ease-in-out;
      transform: translateX(100%);
    }
    #sideMenu.open {
      transform: translateX(0);
    }
    .menu-overlay {
      display: none;
      background: rgba(0,0,0,0.4);
    }
    .menu-overlay.open {
      display: block;
    }

    .edit-mode-active .edit-badge { display: flex !important; }
    .edit-mode-active .main-btn-circle { opacity: 0.3; filter: grayscale(0.5); }
    .half-sheet { height: 85vh; overflow-y: auto; }
    .hidden { display: none; }
  </style>
</head>
<body class="bg-gray-100 flex justify-center text-gray-800 overflow-x-hidden">

  <div id="appContainer" class="w-full max-w-md bg-white min-h-screen shadow-xl relative pb-28 overflow-x-hidden">
    <header class="flex justify-between items-center p-4 border-b bg-white sticky top-0 z-20">
      <h1 class="text-xl font-bold text-blue-600 tracking-tight">BurnCalorie</h1>
      <div class="flex gap-1">
        <button onclick="toggleCalendarModal(true)" class="text-2xl p-2 active:bg-gray-100 rounded-full">📅</button>
        <button onclick="toggleSideMenu(true)" class="text-2xl p-2 active:bg-gray-100 rounded-full font-bold">≡</button>
      </div>
    </header>

    <div id="menuOverlay" onclick="toggleSideMenu(false)" class="menu-overlay fixed inset-0 z-40"></div>
    
    <div id="sideMenu" class="fixed top-0 right-0 h-full w-2/3 max-w-[280px] bg-white z-50 shadow-2xl p-6">
      <div class="flex justify-between items-center mb-8">
        <h2 class="font-bold text-gray-400 uppercase text-xs tracking-widest">Menu</h2>
        <button onclick="toggleSideMenu(false)" class="text-2xl text-gray-400">✕</button>
      </div>
      <nav class="space-y-4">
        <button onclick="goToMyPage()" class="w-full text-left p-4 hover:bg-blue-50 rounded-2xl flex items-center gap-3 transition-all border border-transparent active:border-blue-200">
          <span class="text-xl">👤</span>
          <span class="font-bold text-gray-700">マイページ</span>
        </button>
        <div class="pt-4 border-t border-gray-100 mt-4 text-[10px] text-gray-300">
          BurnCalorie v12.0
        </div>
      </nav>
    </div>

    <section id="mainView">
      <section class="p-4 bg-blue-50/50 border-b">
        <h2 class="text-xs text-gray-400 mb-1 font-bold uppercase">今日の消費カロリー</h2>
        <div class="flex items-baseline gap-2">
            <div class="text-3xl font-black text-blue-600 mb-3"><span id="todayTotal">0</span> <span class="text-sm font-normal text-gray-400">kcal</span></div>
            <div class="text-xs text-gray-400">/ 目標 <span id="displayGoal">0</span> kcal</div>
        </div>
        <div class="h-32 w-full bg-white p-2 rounded-xl border border-blue-100 shadow-sm">
          <canvas id="weeklyChart"></canvas>
        </div>
      </section>

      <section class="p-6">
        <h2 class="text-sm text-gray-500 mb-6 font-semibold flex items-center gap-2">
          アクティビティを記録
          <span id="editStatusBadge" class="hidden text-[10px] bg-red-500 text-white px-2 py-0.5 rounded-full">編集モード中</span>
        </h2>
        <div id="buttonGrid" class="grid grid-cols-3 gap-y-12 gap-x-4 text-center items-start">
          <div id="controlButtons" class="contents">
            <div id="addBtnBox" class="flex flex-col items-center">
              <button onclick="openRegisterModal()" class="w-16 h-16 bg-gray-50 border-2 border-dashed border-gray-300 rounded-full flex items-center justify-center text-2xl text-gray-400 active:bg-gray-100 transition">＋</button>
              <span class="text-xs mt-2 text-gray-400 font-medium">追加</span>
            </div>
            <div class="flex flex-col items-center">
              <button id="masterEditBtn" onclick="toggleEditMode()" class="w-16 h-16 bg-gray-50 border-2 border-gray-200 rounded-full flex items-center justify-center text-xl text-gray-400 active:bg-blue-50 transition">
                <span id="editBtnIcon">✎</span>
              </button>
              <span id="editBtnLabel" class="text-xs mt-2 text-gray-400 font-medium">編集・削除</span>
            </div>
          </div>
        </div>
      </section>
    </section>

    <section id="myPageView" class="hidden p-6 animate-slide-up">
        <div class="flex items-center gap-2 mb-8">
            <button onclick="toggleMyPage(false)" class="text-2xl p-2">←</button>
            <h2 class="text-xl font-bold">マイページ</h2>
        </div>
        <div class="space-y-6">
            <div class="bg-gray-50 p-4 rounded-2xl">
                <label class="text-xs font-bold text-gray-400 block mb-2">身長 (cm)</label>
                <input id="userHeight" type="number" class="w-full bg-transparent border-b-2 border-gray-200 p-2 text-xl font-bold outline-none focus:border-blue-500 transition-all">
            </div>
            <div class="bg-gray-50 p-4 rounded-2xl">
                <label class="text-xs font-bold text-gray-400 block mb-2">体重 (kg)</label>
                <input id="userWeight" type="number" class="w-full bg-transparent border-b-2 border-gray-200 p-2 text-xl font-bold outline-none focus:border-blue-500 transition-all">
            </div>
            <div class="bg-gray-50 p-4 rounded-2xl">
                <label class="text-xs font-bold text-gray-400 block mb-2">目標消費カロリー (kcal/日)</label>
                <input id="userGoal" type="number" class="w-full bg-transparent border-b-2 border-gray-200 p-2 text-xl font-bold outline-none focus:border-blue-500 transition-all">
            </div>
            <button onclick="saveUserProfile()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg mt-8 active:scale-95 transition-all">設定を保存</button>
        </div>
    </section>

    <div id="patternModal" class="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center hidden p-4">
      <div class="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl overflow-y-auto max-h-[90vh]">
        <h3 id="modalTitle" class="text-lg font-bold mb-4">アクティビティ設定</h3>
        <div id="iconSelectionGrid" class="grid grid-cols-4 gap-2 mb-4 p-2 bg-gray-50 rounded-xl border"></div>
        <div class="space-y-3">
          <input id="inputName" type="text" placeholder="なまえ" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
          <div class="flex gap-2">
            <input id="inputMin" type="number" placeholder="時間(分)" oninput="autoCalcKcal()" class="w-full border p-3 rounded-xl outline-none flex-1">
            <input id="inputKcal" type="number" placeholder="kcal" class="w-full border p-3 rounded-xl outline-none flex-1">
          </div>
        </div>
        <div class="flex gap-2 mt-8">
          <button onclick="closePatternModal()" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold text-gray-400">戻る</button>
          <button onclick="savePattern()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg">保存</button>
        </div>
      </div>
    </div>

    <div id="calendarModal" class="fixed inset-0 bg-black/50 z-[60] flex items-end justify-center hidden">
        <div class="bg-white rounded-t-3xl w-full max-w-md p-6 shadow-2xl animate-slide-up half-sheet">
          <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h3 class="text-lg font-bold text-blue-600 font-black">履歴と編集</h3>
            <button onclick="toggleCalendarModal(false)" class="text-gray-400 text-2xl p-2">✕</button>
          </div>
          <div id="calendar" class="mb-4"></div>
          <div id="dailyDetailList" class="space-y-2 pb-20"></div>
        </div>
    </div>
  </div>

  <script>
    const HISTORY_KEY = 'burn_cal_hist_v12';
    const PATTERN_KEY = 'burn_cal_patt_v12';
    const DETAIL_KEY = 'burn_cal_detail_v12';
    const PROFILE_KEY = 'burn_cal_prof_v12';
    
    let calorieHistory = JSON.parse(localStorage.getItem(HISTORY_KEY)) || {};
    let dailyDetails = JSON.parse(localStorage.getItem(DETAIL_KEY)) || {}; 
    let userProfile = JSON.parse(localStorage.getItem(PROFILE_KEY)) || { height: 160, weight: 55, goal: 300 };
    let myPatterns = JSON.parse(localStorage.getItem(PATTERN_KEY)) || [
        { id: 'fixed-1', emoji: '🏃', name: 'ランニング', kcal: 231, min: 30, mets: 8 }
    ];

    const getTodayStr = (date = new Date()) => {
        const d = new Date(date.getTime() - (date.getTimezoneOffset() * 60000));
        return d.toISOString().split('T')[0];
    };
    let todayStr = getTodayStr();
    let selectedDate = todayStr;
    let selectedEmoji = '';
    let currentMets = 3;
    let isEditMode = false;
    let editingPatternId = null;

    const emojiList = [
      {e:'🚶', n:'歩く', m:3.5}, {e:'🏃', n:'走る', m:8}, {e:'🧹', n:'掃除', m:3}, {e:'🚲', n:'自転車', m:4},
      {e:'🧘', n:'ヨガ', m:2.5}, {e:'🏋️', n:'筋トレ', m:5}, {e:'🏊', n:'泳ぐ', m:7}, {e:'💃', n:'ダンス', m:4.5},
      {e:'🥊', n:'ボクシング', m:10}, {e:'🧗', n:'登る', m:8}, {e:'🛀', n:'入浴', m:1.5}
    ];

    // --- メニュー操作 ---
    function toggleSideMenu(show) {
      document.getElementById('sideMenu').classList.toggle('open', show);
      document.getElementById('menuOverlay').classList.toggle('open', show);
    }

    function goToMyPage() {
      toggleSideMenu(false);
      toggleMyPage(true);
    }

    function toggleMyPage(show) {
        document.getElementById('mainView').classList.toggle('hidden', show);
        document.getElementById('myPageView').classList.toggle('hidden', !show);
        if(show) {
            document.getElementById('userHeight').value = userProfile.height;
            document.getElementById('userWeight').value = userProfile.weight;
            document.getElementById('userGoal').value = userProfile.goal;
        }
    }

    // --- 以下、既存ロジック ---
    function saveUserProfile() {
        userProfile = {
            height: parseFloat(document.getElementById('userHeight').value) || 0,
            weight: parseFloat(document.getElementById('userWeight').value) || 0,
            goal: parseInt(document.getElementById('userGoal').value) || 0
        };
        localStorage.setItem(PROFILE_KEY, JSON.stringify(userProfile));
        updateUI();
        alert('プロフィールを保存しました！');
        toggleMyPage(false);
    }

    function autoCalcKcal() {
        const min = parseFloat(document.getElementById('inputMin').value) || 0;
        const kcal = Math.round(1.05 * currentMets * (min / 60) * userProfile.weight);
        document.getElementById('inputKcal').value = kcal;
    }

    const ctx = document.getElementById('weeklyChart').getContext('2d');
    const myChart = new Chart(ctx, {
      type: 'bar',
      data: { labels: [], datasets: [{ data: [], backgroundColor: [], borderRadius: 6 }] },
      options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, display: false }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
    });

    function updateUI() {
      const labels = []; const data = []; const colors = [];
      for(let i=6; i>=0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        const s = getTodayStr(d);
        labels.push(['日','月','火','水','木','金','土'][d.getDay()]);
        data.push(calorieHistory[s] || 0);
        colors.push(s === todayStr ? '#3b82f6' : '#bfdbfe');
      }
      myChart.data.labels = labels;
      myChart.data.datasets[0].data = data;
      myChart.data.datasets[0].backgroundColor = colors;
      myChart.update();
      document.getElementById('todayTotal').innerText = calorieHistory[todayStr] || 0;
      document.getElementById('displayGoal').innerText = userProfile.goal;
    }

    const iGrid = document.getElementById('iconSelectionGrid');
    emojiList.forEach(item => {
      const b = document.createElement('button');
      b.className = "flex flex-col items-center p-2 rounded-xl border-2 border-transparent hover:bg-blue-50 transition-all";
      b.innerHTML = `<span class="text-2xl">${item.e}</span><span class="text-[9px] text-gray-500 font-bold mt-1">${item.n}</span>`;
      b.onclick = () => {
        Array.from(iGrid.children).forEach(el => el.classList.remove('bg-blue-100', 'border-blue-500'));
        b.classList.add('bg-blue-100', 'border-blue-500');
        selectedEmoji = item.e;
        currentMets = item.m;
        if(!editingPatternId) document.getElementById('inputName').value = item.n;
        autoCalcKcal();
      };
      iGrid.appendChild(b);
    });

    function addCalorie(p) {
      const kcal = parseInt(p.kcal);
      calorieHistory[todayStr] = (calorieHistory[todayStr] || 0) + kcal;
      if(!dailyDetails[todayStr]) dailyDetails[todayStr] = [];
      dailyDetails[todayStr].push({ id: Date.now(), emoji: p.emoji, name: p.name, kcal: kcal, min: p.min });
      saveData();
    }

    function saveData() {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(calorieHistory));
      localStorage.setItem(DETAIL_KEY, JSON.stringify(dailyDetails));
      updateUI();
    }

    function renderDailyDetails(date) {
      const listDiv = document.getElementById('dailyDetailList');
      listDiv.innerHTML = `<p class="text-xs text-gray-400 font-bold mb-4">${date} の内訳</p>`;
      const items = dailyDetails[date] || [];
      if(items.length === 0) { listDiv.innerHTML += '<p class="text-gray-400 text-center py-8">記録がありません</p>'; return; }
      items.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = "flex items-center gap-3 bg-white p-3 rounded-2xl border shadow-sm mb-2";
        row.innerHTML = `<span class="text-xl">${item.emoji}</span><div class="flex-1 text-xs font-bold">${item.name}</div><input type="number" value="${item.kcal}" onchange="updateItemKcal('${date}', ${index}, this.value)" class="w-14 text-right font-bold text-blue-600 outline-none"><span class="text-[10px] text-gray-400">kcal</span><button onclick="deleteDetailItem('${date}', ${index})" class="ml-2 text-red-400 p-1">✕</button>`;
        listDiv.appendChild(row);
      });
    }

    function updateItemKcal(date, index, newVal) {
        dailyDetails[date][index].kcal = parseInt(newVal) || 0;
        calorieHistory[date] = dailyDetails[date].reduce((sum, i) => sum + i.kcal, 0);
        saveData();
    }

    function deleteDetailItem(date, index) {
        dailyDetails[date].splice(index, 1);
        calorieHistory[date] = dailyDetails[date].reduce((sum, i) => sum + i.kcal, 0);
        saveData(); renderDailyDetails(date);
    }

    function renderButtons() {
      const grid = document.getElementById('buttonGrid');
      grid.querySelectorAll('.dynamic-item').forEach(el => el.remove());
      myPatterns.forEach(p => {
        const div = document.createElement('div');
        div.className = "relative flex flex-col items-center dynamic-item";
        div.innerHTML = `<button onclick="if(!isEditMode) addCalorie(${JSON.stringify(p).replace(/"/g, '&quot;')})" class="main-btn-circle w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center text-3xl shadow-sm active:scale-95 transition-all">${p.emoji}</button><span class="text-xs mt-2 font-bold text-gray-700">${p.name}</span><span class="text-[10px] text-gray-400 mt-1">${p.min}分/${p.kcal}kcal</span><button onclick="deletePattern('${p.id}')" class="edit-badge hidden absolute -top-1 -left-1 bg-red-500 text-white w-7 h-7 rounded-full text-[10px] font-bold items-center justify-center shadow-lg border-2 border-white">✕</button><button onclick="openEditModal('${p.id}')" class="edit-badge hidden absolute -top-1 -right-1 bg-gray-600 text-white w-7 h-7 rounded-full text-[10px] font-bold items-center justify-center shadow-lg border-2 border-white">✎</button>`;
        grid.insertBefore(div, document.getElementById('controlButtons'));
      });
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        document.getElementById('appContainer').classList.toggle('edit-mode-active', isEditMode);
        document.getElementById('editBtnIcon').innerText = isEditMode ? '✓' : '✎';
        document.getElementById('editStatusBadge').classList.toggle('hidden', !isEditMode);
    }

    function openRegisterModal() { editingPatternId = null; clearInputs(); togglePatternModal(true); }
    function openEditModal(id) {
        editingPatternId = id; const p = myPatterns.find(x => x.id === id);
        document.getElementById('inputName').value = p.name; document.getElementById('inputMin').value = p.min;
        document.getElementById('inputKcal').value = p.kcal; selectedEmoji = p.emoji; togglePatternModal(true);
    }
    function savePattern() {
        const p = { id: editingPatternId || 'p-'+Date.now(), emoji: selectedEmoji, name: document.getElementById('inputName').value, kcal: parseInt(document.getElementById('inputKcal').value), min: parseInt(document.getElementById('inputMin').value) };
        if(editingPatternId) myPatterns[myPatterns.findIndex(x=>x.id===editingPatternId)] = p;
        else myPatterns.push(p);
        localStorage.setItem(PATTERN_KEY, JSON.stringify(myPatterns));
        togglePatternModal(false); renderButtons();
    }
    function deletePattern(id) { myPatterns = myPatterns.filter(x=>x.id!==id); localStorage.setItem(PATTERN_KEY, JSON.stringify(myPatterns)); renderButtons(); }
    function clearInputs() { document.getElementById('inputName').value=''; document.getElementById('inputKcal').value=''; document.getElementById('inputMin').value=''; selectedEmoji=''; }
    function togglePatternModal(s) { document.getElementById('patternModal').classList.toggle('hidden', !s); }
    function closePatternModal() { togglePatternModal(false); }

    let calendar;
    function toggleCalendarModal(s) {
      document.getElementById('calendarModal').classList.toggle('hidden', !s);
      if(s && !calendar) {
        calendar = new VanillaCalendar('#calendar', {
            settings: { lang: 'ja', selection: { day: 'single' } },
            actions: { clickDay(e, self) { selectedDate = self.selectedDates[0]; renderDailyDetails(selectedDate); }}
        });
        calendar.init();
      }
      if(s) renderDailyDetails(selectedDate || todayStr);
    }

    renderButtons();
    updateUI();
  </script>
</body>
</html>
