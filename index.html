<div id="appContainer" class="w-full max-w-md bg-white min-h-screen relative">

  <div id="mainView" class="block">
    <header class="flex justify-between items-center p-4 border-b bg-white sticky top-0 z-20">
      <h1 class="text-xl font-bold text-blue-600">BurnCalorie</h1>
      <div class="flex gap-2">
        <button onclick="toggleCalendarModal(true)" class="text-2xl p-2">📅</button>
        <button onclick="showPage('myPage')" class="text-2xl p-2">👤</button>
      </div>
    </header>
    </div>

  <div id="myPageView" class="hidden min-h-screen bg-gray-50 p-6 animate-slide-up">
    <div class="flex items-center gap-2 mb-8">
      <button onclick="showPage('main')" class="text-2xl p-2">←</button>
      <h2 class="text-xl font-bold">プロフィール設定</h2>
    </div>
    </div>

</div>

<script>
  // 画面を切り替える関数
  function showPage(pageName) {
    const main = document.getElementById('mainView');
    const myPage = document.getElementById('myPageView');

    if (pageName === 'myPage') {
      main.classList.add('hidden');    // メインを隠す
      myPage.classList.remove('hidden'); // マイページを出す
      // 入力欄に現在の値をセット
      document.getElementById('userHeight').value = userProfile.height;
      document.getElementById('userWeight').value = userProfile.weight;
      document.getElementById('userGoal').value = userProfile.goal;
    } else {
      main.classList.remove('hidden'); // メインを出す
      myPage.classList.add('hidden');    // マイページを隠す
      updateUI(); // 数値が変わっているかもしれないので更新
    }
  }
</script>
